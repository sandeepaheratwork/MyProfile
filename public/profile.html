<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile | TechForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="translations.js"></script>
    <style>
        .portfolio-header {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-2xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-2xl);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
        }

        .portfolio-avatar {
            width: 100px;
            height: 100px;
            background: var(--color-accent-gradient);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            box-shadow: var(--shadow-glow);
            overflow: hidden;
        }

        .portfolio-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portfolio-info {
            flex: 1;
        }

        .portfolio-info h1 {
            font-size: 2rem;
            margin-bottom: var(--spacing-xs);
        }

        .portfolio-role {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.1);
            color: var(--color-accent-primary);
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: var(--spacing-md);
        }

        .portfolio-contact {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--color-text-secondary);
        }

        .portfolio-contact svg {
            width: 18px;
            height: 18px;
            color: var(--color-text-muted);
        }

        .content-section {
            margin-bottom: var(--spacing-2xl);
        }

        .content-section h2 {
            font-size: 1.5rem;
            margin-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
            padding-bottom: var(--spacing-sm);
        }

        .bio-text {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            background: var(--color-bg-secondary);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-sm);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-lg);
        }

        .portfolio-item {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            transition: all var(--transition-base);
        }

        .portfolio-item:hover {
            transform: translateY(-4px);
            border-color: var(--color-accent-primary);
            box-shadow: var(--shadow-md);
        }

        .portfolio-item-icon {
            width: 48px;
            height: 48px;
            background: var(--color-bg-tertiary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-md);
            color: var(--color-accent-primary);
        }

        .portfolio-item-icon svg {
            width: 24px;
            height: 24px;
        }

        .portfolio-item h3 {
            font-size: 1.1rem;
            margin-bottom: var(--spacing-sm);
        }

        .portfolio-item p {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }

        .error-state {
            text-align: center;
            padding: var(--spacing-2xl);
            display: none;
        }

        /* Mobile Responsiveness Refinement */
        @media (max-width: 640px) {
            .portfolio-header {
                flex-direction: column;
                text-align: center;
                padding: var(--spacing-xl) var(--spacing-lg);
                gap: var(--spacing-md);
            }

            .portfolio-avatar {
                width: 90px;
                height: 90px;
                margin-top: -10px;
            }

            .portfolio-info h1 {
                font-size: 1.75rem;
                line-height: 1.2;
            }

            .portfolio-role {
                margin-bottom: var(--spacing-sm);
            }

            .portfolio-contact {
                justify-content: center;
                font-size: 0.9375rem;
                flex-wrap: wrap;
            }

            .portfolio-actions {
                width: 100%;
                margin-top: var(--spacing-sm);
            }

            .portfolio-actions .btn {
                width: 100%;
                justify-content: center;
            }

            .content-section h2 {
                font-size: 1.25rem;
                margin-bottom: var(--spacing-md);
            }

            .bio-text {
                font-size: 1rem;
                padding: var(--spacing-md);
                line-height: 1.7;
            }

            .portfolio-grid {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .portfolio-item {
                padding: var(--spacing-md);
            }
        }

        /* Prevent potential horizontal overflow */
        html,
        body {
            overflow-x: clip;
            width: 100%;
            position: relative;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon profile-logo">
                    <img src="assets/owner-profile.jpg" alt="Profile"
                        style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                </div>
                <h1 data-i18n="app_title">TechForge</h1>
            </div>
            <div class="language-switcher">
                <select id="languageSelect" class="btn btn-secondary btn-sm">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="hi">हिन्दी</option>
                </select>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="loadingState" class="loading-state active">
            <div class="spinner"></div>
            <p data-i18n="loading_profile_details">Loading profile details...</p>
        </div>

        <div id="errorState" class="error-state">
            <h3 data-i18n="something_wrong">Something went wrong</h3>
            <p></p>
            <a href="/" class="btn btn-primary" style="margin-top: 1rem;" data-i18n="back_to_dashboard">Back to Dashboard</a>
        </div>

        <div id="profileContent">
            <!-- Content injected by JS -->
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pulltorefreshjs/0.1.22/index.umd.min.js"></script>
    <script src="profile_app.js"></script>
</body>

</html>
